<svg width="400" height="400" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad5e" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad5f" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Dark purple background -->
  <rect width="200" height="200" fill="#1e1b4b"/>

  <!-- Glow effect behind scales -->
  <ellipse cx="100" cy="100" rx="60" ry="40" fill="url(#glow)" opacity="0.3"/>

  <!-- Main hexagonal scales -->
  <polygon points="60,80 70,75 80,80 80,90 70,95 60,90" fill="url(#grad5e)" stroke="#312e81" stroke-width="2"/>
  <polygon points="80,80 90,75 100,80 100,90 90,95 80,90" fill="url(#grad5e)" stroke="#312e81" stroke-width="2"/>
  <polygon points="100,80 110,75 120,80 120,90 110,95 100,90" fill="url(#grad5e)" stroke="#312e81" stroke-width="2"/>

  <polygon points="70,95 80,90 90,95 90,105 80,110 70,105" fill="url(#grad5f)" stroke="#312e81" stroke-width="2"/>
  <polygon points="90,95 100,90 110,95 110,105 100,110 90,105" fill="url(#grad5f)" stroke="#312e81" stroke-width="2"/>
  <polygon points="110,95 120,90 130,95 130,105 120,110 110,105" fill="url(#grad5f)" stroke="#312e81" stroke-width="2"/>

  <polygon points="80,110 90,105 100,110 100,120 90,125 80,120" fill="url(#grad5e)" stroke="#312e81" stroke-width="2"/>
  <polygon points="100,110 110,105 120,110 120,120 110,125 100,120" fill="url(#grad5e)" stroke="#312e81" stroke-width="2"/>
  <polygon points="120,110 130,105 140,110 140,120 130,125 120,120" fill="url(#grad5e)" stroke="#312e81" stroke-width="2"/>

  <!-- Tail extension -->
  <polygon points="130,95 138,91 146,95 146,103 138,107 130,103" fill="url(#grad5e)" stroke="#312e81" stroke-width="1.5" opacity="0.95"/>
  <polygon points="146,95 154,91 162,95 162,103 154,107 146,103" fill="url(#grad5e)" stroke="#312e81" stroke-width="1.5" opacity="0.85"/>
  <polygon points="154,91 160,88 166,91 166,97 160,100 154,97" fill="url(#grad5e)" stroke="#312e81" stroke-width="1.5" opacity="0.7"/>
  <polygon points="162,88 167,85 172,88 172,93 167,96 162,93" fill="url(#grad5e)" stroke="#312e81" stroke-width="1" opacity="0.5"/>

  <!-- Network lines with glow -->
  <g stroke="#c4b5fd" stroke-width="3" opacity="0.4" filter="blur(2px)">
    <line x1="70" y1="85" x2="90" y2="85"/>
    <line x1="90" y1="85" x2="110" y2="85"/>
    <line x1="80" y1="100" x2="100" y2="100"/>
    <line x1="100" y1="100" x2="120" y2="100"/>
    <line x1="90" y1="115" x2="110" y2="115"/>
    <line x1="110" y1="115" x2="130" y2="115"/>
  </g>
  <g stroke="#a78bfa" stroke-width="2" opacity="0.8">
    <line x1="70" y1="85" x2="90" y2="85"/>
    <line x1="90" y1="85" x2="110" y2="85"/>
    <line x1="80" y1="100" x2="100" y2="100"/>
    <line x1="100" y1="100" x2="120" y2="100"/>
    <line x1="90" y1="115" x2="110" y2="115"/>
    <line x1="110" y1="115" x2="130" y2="115"/>
  </g>

  <!-- Nodes with bright centers -->
  <circle cx="90" cy="85" r="6" fill="#a78bfa"/>
  <circle cx="110" cy="85" r="6" fill="#a78bfa"/>
  <circle cx="100" cy="100" r="6" fill="#a78bfa"/>
  <circle cx="120" cy="100" r="6" fill="#a78bfa"/>
  <circle cx="110" cy="115" r="6" fill="#a78bfa"/>

  <circle cx="90" cy="85" r="3" fill="#e0e7ff"/>
  <circle cx="110" cy="85" r="3" fill="#e0e7ff"/>
  <circle cx="100" cy="100" r="3" fill="#e0e7ff"/>
  <circle cx="120" cy="100" r="3" fill="#e0e7ff"/>
  <circle cx="110" cy="115" r="3" fill="#e0e7ff"/>
</svg>
